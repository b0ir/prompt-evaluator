name: Bot Command

# Slash commands on PR comments: /dev-bot review | summarize | help.
# Runs on the Pro OAuth token via claude-code-action.
on:
  issue_comment:
    types: [created]

jobs:
  command:
    # PR comments only, must start with /dev-bot, and only the repo
    # owner / collaborators can invoke — strangers exit here at zero cost.
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/dev-bot') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      # Immediate ack so the commenter knows the trigger fired — the Claude
      # step below can take several minutes, and a silent gap reads as "broken".
      - name: Acknowledge trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes'

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            A maintainer posted a /dev-bot command on PR #${{ github.event.issue.number }}
            in ${{ github.repository }}. The comment:

            ${{ github.event.comment.body }}

            Execute the subcommand (the word after "/dev-bot"):
            - `review` — read the diff with `gh pr diff`, inspect surrounding files as
              needed, then post ONE comment via `gh pr comment` starting with a verdict
              line (PASS, WARN, or BLOCK) followed by concise findings (file:line, one
              sentence each). Skip style nits a formatter would catch.
            - `summarize` — post a plain-language summary of what this PR changes and
              why, written for a non-technical stakeholder.
            - `help` — post a comment listing the commands: /dev-bot review,
              /dev-bot summarize, /dev-bot help.
            - anything else — treat the remaining text as a free-form instruction
              about this PR and respond in a comment.
          claude_args: |
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git log:*),Bash(git diff:*)"
